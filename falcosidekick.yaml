# FalcoSidekick config for THNKBIG
listenport: 2801
falco:
  watchFiles: false

telegram:
  enabled: true
  token: "${TELEGRAM_BOT_TOKEN}"
  chatid: "-1003757942684"
  parseMode: "Markdown"
  messageFormat: "【{{ .Priority }}】 {{ .Output }}"
  recipientname: "THNKBIG Security"
  messagethreadid: 2006

# Forward events to FalcoClaw response engine
webhook:
  enabled: true
  address: "http://localhost:2804"
  method: "POST"
  contenttype: "application/json"
  checkcert: true
  mutetls: false
  minimumpriority: "warning"

stdout:
  enabled: false

redis:
  enabled: false

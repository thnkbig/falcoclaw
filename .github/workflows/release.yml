name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Workaround: goreleaser v2.15 creates manifest list with wrong arch labels.
      # Re-create manifest correctly using docker manifest.
      - name: Fix and push multi-arch manifest
        run: |
          VERSION="${TAG#v}"
          echo "Version: $VERSION"
          
          # Fetch the pushed image digests
          AMD64_DIGEST=$(docker manifest inspect ghcr.io/thnkbig/falcoclaw:${VERSION}-amd64 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['manifests'][0]['digest'])" 2>/dev/null || echo "failed")
          ARM64_DIGEST=$(docker manifest inspect ghcr.io/thnkbig/falcoclaw:${VERSION}-arm64 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['manifests'][0]['digest'])" 2>/dev/null || echo "failed")
          
          echo "amd64 digest: $AMD64_DIGEST"
          echo "arm64 digest: $ARM64_DIGEST"
          
          # Create and push versioned manifest with CORRECT architecture labels
          docker manifest create \
            --amend ghcr.io/thnkbig/falcoclaw:${VERSION} \
            ghcr.io/thnkbig/falcoclaw:${VERSION}-amd64@${AMD64_DIGEST} \
            ghcr.io/thnkbig/falcoclaw:${VERSION}-arm64@${ARM64_DIGEST} 2>/dev/null || true
          
          docker manifest create \
            --amend ghcr.io/thnkbig/falcoclaw:latest \
            ghcr.io/thnkbig/falcoclaw:${VERSION}-amd64@${AMD64_DIGEST} \
            ghcr.io/thnkbig/falcoclaw:${VERSION}-arm64@${ARM64_DIGEST} 2>/dev/null || true
          
          docker manifest push ghcr.io/thnkbig/falcoclaw:${VERSION}
          docker manifest push ghcr.io/thnkbig/falcoclaw:latest
          
          echo "Manifests fixed and pushed"
        env:
          TAG: ${{ github.ref_name }}

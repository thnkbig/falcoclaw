name: Validate & Tag

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      increment_type:
        description: "Version increment type"
        required: false
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  validate-and-tag:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
      increment_type: ${{ steps.tag.outputs.increment_type }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Go Mod Tidy
        run: go mod tidy

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest

      - name: Run Tests
        run: go test ./... -v -count=1

      - name: Build Binary
        env:
          VERSION: ${{ github.sha }}
          COMMIT: ${{ github.sha }}
          DATE: ${{ github.event.head_commit.timestamp }}
        run: |
          CGO_ENABLED=0 go build \
            -ldflags "-s -w -X github.com/thnkbig/falcoclaw/cmd.Version=${VERSION} -X github.com/thnkbig/falcoclaw/cmd.GitCommit=${COMMIT}" \
            -o bin/falcoclaw .

      - name: Validate Rules
        run: |
          ./bin/falcoclaw check --rules rules/responses.yaml

      - name: Check for breaking changes
        id: breaking
        run: |
          breaking="false"
          if git log -1 --pretty=%B | grep -iE 'BREAKING CHANGE:|BREAKING:|!:' || \
             git log -1 --pretty=%B | grep -q 'BREAKING'; then
            breaking="true"
            echo "⚠️ Breaking change detected in commit message"
          fi
          echo "breaking=$breaking" >> $GITHUB_OUTPUT

      - name: Get latest tag and calculate new version
        id: tag
        run: |
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          [ -z "$latest_tag" ] && latest_tag="v0.0.0"
          echo "Latest tag: $latest_tag"

          version=${latest_tag#v}
          IFS='.' read -r major minor patch <<< "$version"

          # Handle invalid version format
          major=${major:-0}
          minor=${minor:-0}
          patch=${patch:-0}

          increment_type="${{ github.event.inputs.increment_type || 'patch' }}"

          if [ "${{ steps.breaking.outputs.breaking }}" == "true" ] && [ -z "${{ github.event.inputs.increment_type }}" ]; then
            increment_type="major"
            echo "📢 Auto-incrementing major version due to breaking change"
          fi

          # Auto-upgrade patch to minor if a feat is introduced
          if [ "$increment_type" == "patch" ] && git log ${latest_tag}..HEAD --pretty=%B | grep -qE '^feat(\(.+\))?:'; then
            increment_type="minor"
            echo "📢 Auto-incrementing minor version due to new features"
          fi

          case $increment_type in
            major)
              major=$((major + 1))
              minor=0
              patch=0
              ;;
            minor)
              minor=$((minor + 1))
              patch=0
              ;;
            patch)
              patch=$((patch + 1))
              ;;
          esac

          new_tag="v${major}.${minor}.${patch}"
          echo "New tag: $new_tag (${increment_type} increment)"
          echo "new_tag=$new_tag" >> $GITHUB_OUTPUT
          echo "increment_type=$increment_type" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          new_tag=${{ steps.tag.outputs.new_tag }}
          latest_tag=$(git describe --tags --abbrev=0 2>/dev/null || echo "")

          echo "# Changelog for $new_tag" > CHANGELOG_TEMP.md
          echo "" >> CHANGELOG_TEMP.md
          echo "## What's Changed" >> CHANGELOG_TEMP.md
          echo "" >> CHANGELOG_TEMP.md

          if [ -n "$latest_tag" ]; then
            features=$(git log ${latest_tag}..HEAD --pretty=format:"- %s (%h)" --grep="^feat" --grep="^feature" -i)
            if [ -n "$features" ]; then
              echo "### 🚀 Features" >> CHANGELOG_TEMP.md
              echo "$features" >> CHANGELOG_TEMP.md
              echo "" >> CHANGELOG_TEMP.md
            fi

            fixes=$(git log ${latest_tag}..HEAD --pretty=format:"- %s (%h)" --grep="^fix" --grep="^bugfix" -i)
            if [ -n "$fixes" ]; then
              echo "### 🐛 Bug Fixes" >> CHANGELOG_TEMP.md
              echo "$fixes" >> CHANGELOG_TEMP.md
              echo "" >> CHANGELOG_TEMP.md
            fi

            docs=$(git log ${latest_tag}..HEAD --pretty=format:"- %s (%h)" --grep="^docs" --grep="^doc:" -i)
            if [ -n "$docs" ]; then
              echo "### 📚 Documentation" >> CHANGELOG_TEMP.md
              echo "$docs" >> CHANGELOG_TEMP.md
              echo "" >> CHANGELOG_TEMP.md
            fi

            other=$(git log ${latest_tag}..HEAD --pretty=format:"- %s (%h)" | grep -viE "^- (feat|feature|fix|bugfix|docs|doc:)" || true)
            if [ -n "$other" ]; then
              echo "### 🔧 Other Changes" >> CHANGELOG_TEMP.md
              echo "$other" >> CHANGELOG_TEMP.md
              echo "" >> CHANGELOG_TEMP.md
            fi
          else
            echo "Initial release" >> CHANGELOG_TEMP.md
          fi

          if [ "${{ steps.breaking.outputs.breaking }}" == "true" ]; then
            echo "## ⚠️ Breaking Changes" >> CHANGELOG_TEMP.md
            echo "" >> CHANGELOG_TEMP.md
            echo "This release contains breaking changes. Please review the changes carefully before upgrading." >> CHANGELOG_TEMP.md
            echo "" >> CHANGELOG_TEMP.md
          fi

          echo "## Full Changelog" >> CHANGELOG_TEMP.md
          if [ -n "$latest_tag" ]; then
            echo "[Compare with $latest_tag](https://github.com/${{ github.repository }}/compare/${latest_tag}...${new_tag})" >> CHANGELOG_TEMP.md
          else
            echo "[View commits in $new_tag](https://github.com/${{ github.repository }}/commits/${new_tag})" >> CHANGELOG_TEMP.md
          fi

      - name: Create and push tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          new_tag=${{ steps.tag.outputs.new_tag }}

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git tag -a $new_tag -m "Release $new_tag - ${{ steps.tag.outputs.increment_type }} version bump"
          git push origin $new_tag

          echo "✅ Successfully created and pushed tag: $new_tag"

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          new_tag=${{ steps.tag.outputs.new_tag }}

          prerelease="false"
          if [[ "$new_tag" =~ ^v0\. ]]; then
            prerelease="true"
          fi

          gh release create $new_tag \
            --title "Release $new_tag" \
            --notes-file CHANGELOG_TEMP.md \
            --prerelease=$prerelease \
            --draft=false
